name: Problem
description: Problem encountered when compiling XiangShan, running EMU, etc.
labels:
  - 'type: problem'
body:
  - type: markdown
    attributes:
      value: |
        You could use English or Chinese to open an issue.
        您可以使用中文或英文提问，我们推荐使用英文。

        This template is only used for problem encountered when compiling XiangShan, running EMU, etc. If this doesn't look right, please back and choose another template.
        这个 issue 模板仅用于处理您在编译香山、运行 EMU 等时遇到的问题。如果您遇到的不是此类问题，请回退并选择其他模板。

        Please make sure that the problem can still be reproduced on the latest commit of the master branch.
        请确保问题在 master 分支最新的 commit 仍能复现。

        Please fill in the following information so we can better understand and address your issue. Thank you!
        请填写以下内容，以便我们更好地理解和处理您的问题。谢谢！
  - type: checkboxes
    id: before-start
    attributes:
      label: Before start
      description: |
        Before start, PLEASE MAKE SURE you have done these:
        开始之前，请确保您已经做过以下事情：
      options:
        - label: I have read the [XiangShan Documents](https://xiangshan-doc.readthedocs.io/zh_CN/latest). 我已经阅读过香山文档。
          required: true
        - label: I have searched the previous issues and did not find anything relevant. 我已经搜索过之前的 issue，并没有找到相关的。
          required: true
        - label: I have searched the previous discussions and did not find anything relevant. 我已经搜索过之前的 discussions，并没有找到相关的。
          required: true
        - label: I have reproduced the problem using the latest commit on the master branch. 我已经使用 master 分支最新的 commit 复现了问题。
          required: true
  - type: dropdown
    id: branch
    attributes:
      label: Branch
      description: |
        Please select the branch you are using.
        请选择您使用的分支。
      options:
        - master (kunminghu-v2)
        - kunminghu-v3
        - nanhu
        - yanqihu
        - Other (please specify in "Additional context" section)
    validations:
      required: true
  - type: textarea
    id: describe
    attributes:
      label: Describe you problem
      description: |
        A clear and concise description of what the problem is.
        请清晰、准确地描述您遇到的问题。

        If applicable, add screenshots / logs to help explain your problem.
        如果可能，请提供有助于您描述问题的屏幕截图和日志。

        Please upload logs as attachments, do not paste them directly into the text box.
        请使用附件的形式上传日志，不要直接粘贴到文本框中。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: what-did
    attributes:
      label: What did you do before
      description: |
        Please describe step by step what did you do before you encountered the problem.
        请描述您遇到问题前都做了哪些操作。

        This will help us to reproduce your problem.
        这将有助于我们复现您的问题。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide your environment information.
        请提供您的环境信息。

        You can use `./scripts/bug-report.sh` to collect the environment information and generate a report file, and then upload the report file as an attachment.
        您可以使用 `./scripts/bug-report.sh` 来收集环境信息并生成报告文件，然后将报告文件作为附件上传。

        If you cannot upload the report file, please fill in the form as much as possible.
        如果不便上传报告文件，请尽可能填写此表单。
      placeholder:
      value: |
        - Hardware
          - CPU:
          - Memory (GB):
          - Storage (GB):
        - Software
          - Operating system:
          - gcc version: <!-- run `gcc --version 2>&1 | head -n 1` to get the version -->
          - clang version: <!-- run `clang --version 2>&1 | head -n 1` to get the version, only needed when you use clang -->
          - java version: <!-- run `java -version 2>&1 | head -n 1` to get the version -->
          - mill version: <!-- run `mill -i --version 2>&1 | head -n 1` to get the version -->
        - Repo
          - XiangShan commit id: ``
          - NEMU commit id (if difftest failed with NEMU): ``
          - SPIKE commit id (if difftest failed with SPIKE): ``
        - Build & Run
          - Build command: ``
          - Run command (if applicable): ``
          - Also upload workload (binary and source code) if applicable.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any other context about the problem here.
        可在此处附上其他相关信息。
      placeholder:
    validations:
      required: false
